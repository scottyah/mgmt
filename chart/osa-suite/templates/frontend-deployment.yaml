apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "osa-suite.frontendName" . }}
  labels:
    app.kubernetes.io/component: frontend
    {{- include "osa-suite.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: frontend
          image: {{ include "osa-suite.frontendImage" . }}
          imagePullPolicy: {{ eq .Values.frontend.tag "latest" | ternary "Always" "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "osa-suite.frontendName" . }}-nginx
