apiVersion: v1
kind: Secret
metadata:
  name: {{ include "osa-suite.fullname" . }}-secrets
  labels:
    {{- include "osa-suite.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | default (randAlphaNum 64) | quote }}
  FERNET_KEY: {{ required "secrets.fernetKey is required — generate with: python -c \"from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())\"" .Values.secrets.fernetKey | quote }}
  AUTH_USERNAME: {{ .Values.auth.username | quote }}
  {{- if .Values.auth.passwordHash }}
  AUTH_PASSWORD_HASH: {{ .Values.auth.passwordHash | quote }}
  {{- end }}
